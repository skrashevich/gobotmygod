  # ── Long Polling ──────────────────────────────────────────────────────────

  /api/updates/poll:
    get:
      tags: [Long Polling]
      summary: Poll for updates
      description: |
        Long-polling endpoint that returns buffered Telegram updates in `getUpdates`-compatible format.

        Requires `long_poll_enabled` to be set on the bot. Blocks until new updates are available or `timeout` seconds elapse.

        Multiple clients can poll simultaneously. Use `offset` to acknowledge processed updates (same semantics as Telegram's `getUpdates`).
      operationId: pollUpdates
      parameters:
        - name: bot_id
          in: query
          required: true
          schema:
            type: integer
          description: Bot ID to poll updates for
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
          description: Acknowledge updates with update_id < offset (Telegram getUpdates semantics)
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 100
          description: Maximum number of updates to return
        - name: timeout
          in: query
          schema:
            type: integer
            default: 30
            maximum: 60
          description: Seconds to wait for updates before returning empty result
      responses:
        '200':
          description: Telegram-compatible getUpdates response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetUpdatesResponse'
              example:
                ok: true
                result:
                  - update_id: 100000001
                    message:
                      message_id: 42
                      text: "Hello"
        '400':
          description: Invalid parameters or long_poll_enabled not set for bot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Telegram Proxy ────────────────────────────────────────────────────────

  /tgapi/bot{token}/{method}:
    x-internal: true
    get:
      tags: [Telegram Proxy]
      summary: Telegram API proxy (GET)
      description: |
        Transparently proxies requests to `api.telegram.org`. No BotMux authentication required — the bot token in the URL is the authorization.

        Several methods are intercepted and handled internally by BotMux instead of being forwarded to Telegram:
        - **`setWebhook`** — Registers the webhook URL as the bot's backend URL in BotMux and enables proxy mode. If the bot token is not yet registered, BotMux auto-registers it via `getMe`. Supports `url` and `drop_pending_updates` parameters.
        - **`deleteWebhook`** — Clears the backend URL and disables proxy mode for the bot. Supports `drop_pending_updates`.
        - **`getWebhookInfo`** — Returns BotMux's internal webhook state including the configured backend URL and pending update count.
        - **`getUpdates`** — When `long_poll_enabled` is set on the matching bot, requests are intercepted and served from BotMux's internal update queue instead of forwarding to Telegram. When the bot is managed by BotMux but long polling is not enabled, returns an empty result to prevent Telegram API conflict errors.
        - **`logOut`** — Returns `{"ok": true, "result": true}` without forwarding. Forwarding would disable the token for 10 minutes.
        - **`close`** — Returns `{"ok": true, "result": true}` without forwarding. Forwarding would shut down the bot instance on Telegram's side.
      operationId: telegramProxyGet
      security: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
          description: Telegram bot token
        - name: method
          in: path
          required: true
          schema:
            type: string
          description: Telegram Bot API method name (e.g., getMe, getUpdates)
      responses:
        '200':
          description: Telegram API response (pass-through)
          content:
            application/json:
              schema:
                type: object
                description: Raw Telegram API response

    post:
      tags: [Telegram Proxy]
      summary: Telegram API proxy (POST)
      description: |
        Transparently proxies POST requests to `api.telegram.org`.

        For send methods (`sendMessage`, `sendPhoto`, `sendVideo`, etc.), BotMux parses the Telegram response to extract the sent message and saves it to the database, capturing outgoing messages that would not appear in `getUpdates`.

        The same method interception rules described in the GET endpoint apply here. Methods like `setWebhook`, `deleteWebhook`, `getWebhookInfo`, `getUpdates`, `logOut`, and `close` are handled internally by BotMux rather than forwarded to Telegram.
      operationId: telegramProxyPost
      security: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
          description: Telegram bot token
        - name: method
          in: path
          required: true
          schema:
            type: string
          description: Telegram Bot API method name (e.g., sendMessage, sendPhoto)
      requestBody:
        description: Telegram API method parameters (passed through as-is)
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
          application/x-www-form-urlencoded:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Telegram API response (pass-through)
          content:
            application/json:
              schema:
                type: object
                description: Raw Telegram API response

  /tgapi/file/bot{token}/{file_path}:
    x-internal: true
    get:
      tags: [Telegram Proxy]
      summary: File download proxy
      description: |
        Downloads a file from Telegram and streams it to the client. This endpoint is a drop-in replacement for Telegram's file download URL, allowing you to configure it as your bot library's `base_file_url`.

        WebP files (stickers) are automatically converted to PNG for browser compatibility. Content types are detected from file extensions, with content sniffing as a fallback. Responses include a `Cache-Control: public, max-age=86400` header.
      operationId: telegramFileProxy
      security: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
          description: Telegram bot token
        - name: file_path
          in: path
          required: true
          schema:
            type: string
          description: Telegram file path (as returned by the `getFile` API method)
      responses:
        '200':
          description: File content streamed from Telegram. WebP files are converted to PNG.
          headers:
            Content-Type:
              schema:
                type: string
              description: Detected MIME type of the file
            Cache-Control:
              schema:
                type: string
                example: "public, max-age=86400"
              description: Caching directive for the file
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid path format
        '502':
          description: Failed to download file from Telegram
