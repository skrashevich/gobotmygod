name: Bug Report
description: Report a bug in BotMux
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Start botmux with ...
        2. Open the web UI
        3. Click on ...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: BotMux Version
      description: "Output of `./botmux -version` or the version shown in the web UI footer"
      placeholder: "v1.2.3"

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment Method
      options:
        - Binary (go build)
        - Docker
        - go install

  - type: input
    id: os
    attributes:
      label: OS / Architecture
      placeholder: "Linux amd64 / macOS arm64 / etc."

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant log output here.
      render: text
